<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>2WAY Memories</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:'Cormorant Garamond',serif;
}

body{
display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at top left,#7b1e4d 0%,transparent 35%),
radial-gradient(circle at bottom right,#412066 0%,transparent 35%),
#080808;

color:white;
}

/* Ambient Glow */

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(
circle at 20% 20%,
rgba(255,255,255,.04),
transparent 30%
),

radial-gradient(
circle at 80% 80%,
rgba(255,255,255,.03),
transparent 30%
);

pointer-events:none;
}

/* COVER */

#cover{
position:absolute;
inset:0;

display:flex;
justify-content:center;
align-items:center;

z-index:100;
}

.cover-card{

width:min(550px,90vw);

padding:70px 40px;

text-align:center;

border-radius:30px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border:1px solid
rgba(255,255,255,.08);

box-shadow:
0 40px 120px rgba(0,0,0,.55);
}

.logo{
width:180px;

margin-bottom:25px;

filter:
drop-shadow(
0 0 25px rgba(255,255,255,.25)
);
}

.cover-title{

font-size:
clamp(4rem,10vw,7rem);

font-weight:300;

letter-spacing:.15em;
}

.cover-sub{

margin-top:15px;

letter-spacing:.35em;

opacity:.75;
}

.open-btn{

margin-top:40px;

padding:14px 28px;

border:none;

border-radius:999px;

cursor:pointer;

color:white;

font-weight:bold;

background:
linear-gradient(
135deg,
#ff4e8c,
#6f61ff
);

transition:.3s;
}

.open-btn:hover{

transform:
translateY(-3px);
}

/* APP */

#app{

display:none;

width:100%;
height:100%;

justify-content:center;
align-items:center;

flex-direction:column;
}

/* BOOK */

.book-scene{

perspective:3000px;
}

.book{

width:min(1200px,95vw);

height:min(760px,82vh);

position:relative;

transform-style:preserve-3d;
}

.spread{

width:100%;
height:100%;

display:flex;

overflow:hidden;

border-radius:20px;

box-shadow:
0 40px 120px rgba(0,0,0,.6);
}

.page{

width:50%;
height:100%;

position:relative;

padding:60px;

background:
linear-gradient(
to bottom,
#f9f1de,
#efe3ca
);

color:#222;
}

.page::before{

content:"";

position:absolute;
inset:0;

background-image:
radial-gradient(
rgba(0,0,0,.02) 1px,
transparent 1px
);

background-size:4px 4px;

pointer-events:none;
}

.left{

border-right:
4px solid rgba(0,0,0,.05);
}

.spine{

position:absolute;

left:50%;
top:0;

transform:
translateX(-50%);

width:18px;
height:100%;

background:
linear-gradient(
to right,
rgba(0,0,0,.2),
rgba(255,255,255,.15),
rgba(0,0,0,.2)
);

z-index:5;
}

.chapter{

letter-spacing:.25em;

color:#777;

font-size:.95rem;
}

.page h2{

margin-top:20px;

font-size:2.5rem;
}

.page p{

margin-top:15px;

line-height:1.7;

color:#555;
}

.memory-btn{

display:inline-block;

margin-top:35px;

padding:14px 24px;

border-radius:999px;

text-decoration:none;

background:#222;

color:white;
}

.polaroid{

width:180px;

height:220px;

background:white;

padding:10px;

border-radius:6px;

margin-bottom:30px;

transform:rotate(-3deg);

box-shadow:
0 15px 30px rgba(0,0,0,.15);
}

.polaroid::before{

content:"MEMORY";

display:flex;

justify-content:center;
align-items:center;

width:100%;
height:160px;

background:
linear-gradient(
135deg,
#ececec,
#d8d8d8
);

color:#888;
}

.polaroid span{

display:block;

text-align:center;

margin-top:12px;

color:#666;
}

.controls{

margin-top:25px;

display:flex;

gap:12px;
}

.ctrl{

padding:12px 20px;

border:none;

border-radius:999px;

cursor:pointer;

color:white;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(12px);
}

.ctrl:hover{

background:
rgba(255,255,255,.14);
}

.flip{

animation:
flipBook .9s ease;
}

@keyframes flipBook{

0%{
transform:rotateY(0deg);
}

50%{
transform:rotateY(-18deg);
}

100%{
transform:rotateY(0deg);
}

}

@media(max-width:900px){

.spread{
flex-direction:column;
}

.page{

width:100%;
height:50%;

padding:35px;
}

.left{

border-right:none;

border-bottom:
3px solid rgba(0,0,0,.06);
}

.spine{
display:none;
}

}

</style>
</head>

<body>

<div id="cover">

<div class="cover-card">

<img
class="logo"
src="https://i.postimg.cc/WzsZgnNK/unnamed-removebg-preview.png"
alt="2WAY">

<div class="cover-title">
MEMORIES
</div>

<div class="cover-sub">
THE DAYS WE REMEMBER
</div>

<button
class="open-btn"
onclick="openBook()">
OPEN BOOK
</button>

</div>

</div>

<div id="app">

<div class="book-scene">

<div
class="book"
id="book">

<div class="spread">

<div
class="page left"
id="leftPage">
</div>

<div class="spine"></div>

<div
class="page right"
id="rightPage">
</div>

</div>

</div>

</div>

<div class="controls">

<button
class="ctrl"
onclick="goCover()">
⌂ COVER
</button>

<button
class="ctrl"
onclick="prevPage()">
◀ PREV
</button>

<button
class="ctrl"
onclick="nextPage()">
NEXT ▶
</button>

</div>

</div>

<script>
const spreads = [

[
{
chapter:"CHAPTER I",
title:"English International Day",
date:"December 2025",
desc:"The beginning of our memories.",
link:"https://drive.google.com/drive/folders/1b0pN4rgcnerd5DFi5lPQHMJyp-Pslpiq?usp=sharing"
},
{
chapter:"CHAPTER II",
title:"Day At PPW • 16/12/25",
date:"December 2025",
desc:"Simple moments become lasting stories.",
link:"https://drive.google.com/drive/folders/1eTO8RQqp250LG7Ow5BOOrd8mkiCJx0Yq?usp=sharing"
}
],

[
{
chapter:"CHAPTER III",
title:"Day At PPW • 17/12/25",
date:"December 2025",
desc:"Another beautiful page.",
link:"https://drive.google.com/drive/folders/1hxKpXYnQ_kJ1OWg7bPnOXUWAFsBNBc5B?usp=sharing"
},
{
chapter:"CHAPTER IV",
title:"Before Sports Day",
date:"December 2025",
desc:"The calm before excitement.",
link:"https://drive.google.com/drive/folders/1-jCuNTxAlDgR7c3J3ogjCA7m4WZ8CUo9?usp=sharing"
}
],

[
{
chapter:"CHAPTER V",
title:"Sports Day",
date:"December 2025",
desc:"Cheers and unforgettable moments.",
link:"https://drive.google.com/drive/folders/1B89pXjvvEyqvbDZlFeE2UNmYFyHxFeKE?usp=sharing"
},
{
chapter:"CHAPTER VI",
title:"Digital Camera Collection",
date:"December 2025",
desc:"Captured through another lens.",
link:"https://drive.google.com/drive/folders/1CXBKXep3nwNxPdSWGU9Vm8oWhOzxlxD9?usp=sharing"
}
],

[
{
chapter:"CHAPTER VII",
title:"New Collection",
date:"December 2025",
desc:"A new page in our story.",
link:"https://drive.google.com/drive/folders/1HkuLjY5-h7VIT_rWovjI-oOA_43akMmG?usp=sharing"
},
{
chapter:"THE END",
title:"Thank You",
date:"2WAY Memories",
desc:"Every photo tells a story worth remembering.",
link:"#"
}
]

];

let currentSpread = 0;

function pageTemplate(data){

return `

<div class="polaroid">
<span>${data.date}</span>
</div>

<div class="chapter">
${data.chapter}
</div>

<h2>
${data.title}
</h2>

<p>
${data.desc}
</p>

${
data.link !== "#"
?
`<a
class="memory-btn"
target="_blank"
href="${data.link}">
OPEN MEMORY
</a>`
:
""
}

`;

}

function renderPages(){

const left =
document.getElementById("leftPage");

const right =
document.getElementById("rightPage");

left.innerHTML =
pageTemplate(
spreads[currentSpread][0]
);

right.innerHTML =
pageTemplate(
spreads[currentSpread][1]
);

const book =
document.getElementById("book");

book.classList.remove("flip");

void book.offsetWidth;

book.classList.add("flip");

}

function openBook(){

document.getElementById(
"cover"
).style.display = "none";

document.getElementById(
"app"
).style.display = "flex";

renderPages();

}

function goCover(){

document.getElementById(
"app"
).style.display = "none";

document.getElementById(
"cover"
).style.display = "flex";

}

function nextPage(){

if(
currentSpread <
spreads.length - 1
){

currentSpread++;

renderPages();

}

}

function prevPage(){

if(
currentSpread > 0
){

currentSpread--;

renderPages();

}

}

/* Swipe Support Mobile */
let touchStartX = 0;
let touchEndX = 0;

document.addEventListener(
"touchstart",
(e)=>{

touchStartX =
e.changedTouches[0].screenX;

},
false
);

document.addEventListener(
"touchend",
(e)=>{

touchEndX =
e.changedTouches[0].screenX;

handleSwipe();

},
false
);

function handleSwipe(){

const distance =
touchEndX - touchStartX;

if(distance < -50){

nextPage();

}

if(distance > 50){

prevPage();

}

}

/* Keyboard Support */

document.addEventListener(
"keydown",
(e)=>{

if(e.key === "ArrowRight"){

nextPage();

}

if(e.key === "ArrowLeft"){

prevPage();

}

if(e.key === "Escape"){

goCover();

}

}
);

/* Initial Render */

renderPages();

</script>

</body>
</html>
```
